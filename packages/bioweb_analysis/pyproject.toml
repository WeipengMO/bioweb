[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "bioweb-analysis"
version = "0.1.0"
description = "Analysis package for BioWeb"
requires-python = ">=3.10"
dependencies = [
  "duckdb",
  "decoupler",
  "lifelines",
  "matplotlib",
  "numpy",
  "pandas",
  "scipy",
]

[tool.setuptools.packages.find]
include = ["bioweb_analysis*"]
